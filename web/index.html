<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON VELOCITY | Endless Run</title>
  <meta name="description" content="A high-speed neon-infused endless runner game. Dash through the cyberpunk city!" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Space+Grotesk:wght@300;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="app">
    <div id="ui-container">
      <div class="hud" id="hud">
        <div class="score-container">
          <span class="label">DISTANCE</span>
          <span id="score" class="value">0m</span>
        </div>
        <div class="high-score-container">
          <span class="label">BEST</span>
          <span id="high-score" class="value">0m</span>
        </div>
      </div>

      <div id="start-screen" class="overlay active">
        <h1 class="glitch" data-text="NEON VELOCITY">NEON VELOCITY</h1>
        <p class="subtitle">DASH THROUGH THE GRID</p>
        <div class="difficulty-selection">
          <button class="diff-btn active" data-difficulty="EASY">EASY</button>
          <button class="diff-btn" data-difficulty="MEDIUM">MEDIUM</button>
          <button class="diff-btn" data-difficulty="HARD">HARD</button>
        </div>
        <button id="start-btn" class="main-btn">INITIATE RUN</button>
        <div class="controls-hint">
          <span>[SPACE] JUMP</span>
          <span>[S] SLIDE</span>
        </div>
      </div>

      <div id="game-over-screen" class="overlay">
        <h2 class="terminal-text">SYSTEM FAILURE</h2>
        <div class="final-stats">
          <p>DISTANCE COVERED: <span id="final-score">0</span>m</p>
        </div>
        <button id="restart-btn" class="main-btn secondary">REBOOT SYSTEM</button>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
